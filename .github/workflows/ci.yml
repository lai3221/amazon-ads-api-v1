name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Validate Composer metadata
        run: composer validate --strict

      - name: Verify generated specification coverage
        run: composer spec:check

      - name: Verify deterministic generation
        run: |
          composer generate
          git diff --exit-code

      - name: Verify PSR-12 formatting
        run: composer format:check

      - name: Run PHPCS
        run: composer lint

      - name: Run PHPStan
        run: composer analyse

  tests:
    name: PHP ${{ matrix.php }} tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php:
          - "8.2"
          - "8.3"
          - "8.4"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run tests
        run: composer test
